<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLB Viewer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>GLB 3D Viewer</h1>
        <button id="theme-toggle">🌙 Dark Mode</button>
    </header>
    <main>
        <div id="viewer-container">
            <canvas id="viewer"></canvas>
        </div>
        <div id="controls">
            <label for="model-select">Chọn mô hình:</label>
            <select id="model-select">
                <option value="models/room.glb">room.glb</option>
                <option value="models/Canh tu 2.glb">Canh tu 2.glb</option>
                <option value="models/gia_de_ban.glb">gia_de_ban.glb</option>
                <option value="models/giuong_phu_2.glb">giuong_phu_2.glb</option>
                <option value="models/khung ban 1.glb">khung ban 1.glb</option>
                <option value="models/mat ban 1.glb">mat ban 1.glb</option>
                <option value="models/tu 2.glb">tu 2.glb</option>
                <option value="models/tu_quan_ao_2.glb">tu_quan_ao_2.glb</option>
            </select>
            <input type="file" id="file-input" accept=".glb">
            <p>Choose a model from the folder or upload your own GLB file.</p>
        </div>
    </main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="script.js"></script>
</body>
</html>
